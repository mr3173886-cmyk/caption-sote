<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Mr. King | Collection</title>
    <style>
        body { background: #0b0e14; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white; }
        
        /* স্নোফল ইফেক্ট */
        .snowflake { position: fixed; top: -10px; color: #fff; font-size: 15px; z-index: 1; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh); } }
        
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; text-align: center; margin-top: 50px; width: 80%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 2; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #3b82f6; object-fit: cover; }
        .btn-box { display: grid; gap: 15px; margin-top: 30px; }
        .btn { background: #1e293b; color: white; padding: 18px; border: none; border-radius: 15px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://files.catbox.moe/ixj7u8.jpg" class="profile-img">
        <h1 style="margin-top:20px">Mr. King</h1>
        <div class="btn-box">
            <button class="btn" onclick="window.location.href='/Love'">Love Box</button>
            <button class="btn" onclick="window.location.href='/Aura'">Aura Box</button>
            <button class="btn" onclick="window.location.href='/Attitude'">Attitude Box</button>
            <button class="btn" onclick="window.location.href='/Fun'">Fun Box</button>
            <button class="btn" onclick="window.location.href='/Friendship'">Friendship Box</button>
        </div>
    </div>
    <script>
        function createSnow() {
            const s = document.createElement('div'); s.innerHTML = '❄'; s.className = 'snowflake';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
        setInterval(createSnow, 300);
    </script>
</body>
</html>
